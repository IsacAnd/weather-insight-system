name: Worker CI

on:
  push:
    paths:
      - "worker/**"
  pull_request:
    paths:
      - "worker/**"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - run: go mod tidy

      - run: go test ./...

      - run: go build .
